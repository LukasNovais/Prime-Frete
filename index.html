<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Sistema Prime</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- TOPO -->

  <header class="topo">

    <p>Calculadora de Frete</p>

  </header>

  <!-- DADOS PRINCIPAIS -->

  <div class="card">

    <div class="linha2">

      <div class="campo">

        <label>KM TOTAL</label>

        <input type="number"
               id="kmTotal">

      </div>

      <div class="campo">

        <label>VEÍCULO</label>

        <select id="tipoVeiculo">

          <option value="5">TOCO</option>

          <option value="3.5">TRUCK</option>

          <option value="3.4">BITRUCK</option>

          <option value="3">CARRETA</option>

          <option value="2.3">BITREM</option>

          <option value="2">RODOTREM</option>

        </select>

      </div>

    </div>

  </div>

  <!-- GRID -->

  <div class="grid">

    <!-- MOTORISTA -->

    <div class="card motorista">

      <div class="tituloCard">

        🚚 MOTORISTA

      </div>

      <div class="campo">

        <label>DIESEL</label>

        <input type="number"
               id="dieselMotorista"
               step="0.01">

      </div>

      <div class="campo">

        <label>VALOR KM</label>

        <input type="number"
               id="valorKmMotorista"
               readonly>

      </div>

      <div class="resultado">

        <span>FRETE</span>

        <strong id="freteMotorista">
          R$ 0,00
        </strong>

      </div>

      <div class="resultado">

        <span>CUSTO DIESEL</span>

        <strong id="custoMotorista">
          R$ 0,00
        </strong>

      </div>

      <button
        class="botaoCompartilhar"
        onclick="compartilharMotorista()">

        COMPARTILHAR

      </button>

    </div>

    <!-- CLIENTE -->

    <div class="card cliente">

      <div class="tituloCard">

        💰 CLIENTE

      </div>

      <div class="campo">

        <label>DIESEL</label>

        <input type="number"
               id="dieselCliente"
               step="0.01">

      </div>

      <div class="campo">

        <label>VALOR KM</label>

        <input type="number"
               id="valorKmCliente"
               readonly>

      </div>

      <div class="resultado">

        <span>FRETE</span>

        <strong id="freteCliente">
          R$ 0,00
        </strong>

      </div>

      <div class="resultado">

        <span>CUSTO DIESEL</span>

        <strong id="custoCliente">
          R$ 0,00
        </strong>

      </div>

      <button
        class="botaoCompartilhar"
        onclick="compartilharCliente()">

        COMPARTILHAR

      </button>

    </div>

  </div>

  <!-- COMISSÃO -->

  <div class="comissao">

    <span>COMISSÃO EMPRESA</span>

    <strong id="comissaoEmpresa">
      R$ 0,00
    </strong>

  </div>

  <!-- AÇÕES -->

  <div class="acoes">

    <button onclick="salvarCotacao()">

      SALVAR COTAÇÃO

    </button>

  </div>

  <!-- HISTÓRICO -->

  <div class="historico">

    <h3>Histórico</h3>

    <div id="historicoLista"></div>

  </div>

  <script src="app.js"></script>

</body>

</html>
