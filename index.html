<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Sistema Prime - Frete</title>

  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>

  <div class="container">

    <header class="topo">
      <h1>Sistema Prime</h1>
      <p>Calculadora Profissional de Frete</p>
    </header>

    <main class="grid">

      <!-- ========================= -->
      <!-- TABELA MOTORISTA -->
      <!-- ========================= -->

      <section class="card">
        <h2>🚚 FRETE MOTORISTA</h2>

        <div class="campo">
          <label>Total KM (ida e volta)</label>
          <input type="number" id="kmMotorista" placeholder="Ex: 850">
        </div>

        <div class="campo">
          <label>Valor KM</label>
          <input type="number" id="valorKmMotorista" placeholder="R$">
        </div>

        <div class="campo">
          <label>Tipo Veículo</label>

          <select id="veiculoMotorista">
            <option value="5">TOCO (5.0)</option>
            <option value="3.5">TRUCK (3.5)</option>
            <option value="3.5">BITRUCK (3.5)</option>
            <option value="3">CARRETA (3.0)</option>
            <option value="2.3">BITREM (2.3)</option>
            <option value="2">RODOTREM (2.0)</option>
          </select>
        </div>

        <div class="campo">
          <label>Valor Litro Diesel</label>
          <input type="number" id="dieselMotorista" placeholder="R$">
        </div>

        <!-- RESULTADOS -->

        <div class="resultado">
          <span>Frete Bruto</span>
          <strong id="freteMotorista">R$ 0,00</strong>
        </div>

        <div class="resultado">
          <span>Custo Diesel</span>
          <strong id="custoMotorista">R$ 0,00</strong>
        </div>

        <div class="resultado">
          <span>Qtd Litros</span>
          <strong id="litrosMotorista">0</strong>
        </div>

        <div class="resultado">
          <span>% Custo Frete</span>
          <strong id="percentualMotorista">0%</strong>
        </div>

      </section>

      <!-- ========================= -->
      <!-- TABELA CLIENTE -->
      <!-- ========================= -->

      <section class="card">
        <h2>💰 FRETE CLIENTE</h2>

        <div class="campo">
          <label>Total KM (ida e volta)</label>
          <input type="number" id="kmCliente" placeholder="Ex: 850">
        </div>

        <div class="campo">
          <label>Valor KM</label>
          <input type="number" id="valorKmCliente" placeholder="R$">
        </div>

        <div class="campo">
          <label>Tipo Veículo</label>

          <select id="veiculoCliente">
            <option value="5">TOCO (5.0)</option>
            <option value="3.5">TRUCK (3.5)</option>
            <option value="3.5">BITRUCK (3.5)</option>
            <option value="3">CARRETA (3.0)</option>
            <option value="2.3">BITREM (2.3)</option>
            <option value="2">RODOTREM (2.0)</option>
          </select>
        </div>

        <div class="campo">
          <label>Valor Litro Diesel</label>
          <input type="number" id="dieselCliente" placeholder="R$">
        </div>

        <!-- RESULTADOS -->

        <div class="resultado">
          <span>Frete Bruto</span>
          <strong id="freteCliente">R$ 0,00</strong>
        </div>

        <div class="resultado">
          <span>Custo Diesel</span>
          <strong id="custoCliente">R$ 0,00</strong>
        </div>

        <div class="resultado">
          <span>Qtd Litros</span>
          <strong id="litrosCliente">0</strong>
        </div>

        <div class="resultado">
          <span>% Custo Frete</span>
          <strong id="percentualCliente">0%</strong>
        </div>

      </section>

    </main>

    <!-- ========================= -->
    <!-- COMISSÃO -->
    <!-- ========================= -->

    <section class="card comissao">

      <h2>📊 COMISSÃO EMPRESA</h2>

      <div class="resultado destaque">
        <span>Diferença Cliente x Motorista</span>
        <strong id="comissaoEmpresa">R$ 0,00</strong>
      </div>

    </section>

    <!-- ========================= -->
    <!-- BOTÕES -->
    <!-- ========================= -->

    <div class="botoes">

      <button onclick="limparCampos()">
        LIMPAR
      </button>

      <button onclick="salvarCotacao()">
        SALVAR
      </button>

      <button onclick="enviarWhatsapp()">
        WHATSAPP
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
